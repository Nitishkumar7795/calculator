apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculator-deployment
  namespace:jenprod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: calculator
  template:
    metadata:
      labels:
        app: calculator
    spec:
      containers:
      - name: calculator
        image: nitishnatikar360/calculator:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: calculator-service
  namespace:jenprod
spec:
  type: LoadBalancer
  selector:
    app: calculator
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
